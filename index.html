<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador FIDC</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #212121;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0;
  --muted: #888;
  --faint: #555;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.08);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.08);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.08);
  --accent: #4ade80;
  --radius: 8px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;line-height:1.6}
.shell{max-width:900px;margin:0 auto;padding:2rem 1.5rem 4rem}
.header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.header h1{font-family:var(--mono);font-size:18px;font-weight:500;letter-spacing:.02em;color:var(--text)}
.header h1 span{color:var(--accent)}
.header p{font-size:13px;color:var(--muted);margin-top:4px}
.tabs{display:flex;gap:0;margin-bottom:2rem;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;width:fit-content}
.tab{font-family:var(--mono);font-size:12px;padding:8px 20px;border:none;background:transparent;color:var(--muted);cursor:pointer;letter-spacing:.04em;transition:all .15s}
.tab:not(:last-child){border-right:1px solid var(--border)}
.tab.active{background:var(--surface2);color:var(--text)}
.tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,0.03)}
.panel{display:none}.panel.active{display:block}
.section-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase;margin:2rem 0 .75rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-bottom:1rem}
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:.85rem}
.slider-row:last-child{margin-bottom:0}
.slider-row label{font-size:13px;color:var(--muted);width:260px;flex-shrink:0;line-height:1.4}
.slider-row label .hint{display:block;font-size:11px;color:var(--faint);font-style:italic;margin-top:1px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:var(--border2);border-radius:2px;outline:none;cursor:pointer}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;transition:transform .1s}
.slider-row input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
.slider-row .val{font-family:var(--mono);font-size:12px;font-weight:500;min-width:88px;text-align:right;color:var(--text)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);g
